<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <meta name="theme-color" content="#160c24" />
  <meta name="description" content="Toque para abrir o convite de Ana Beatriz - 15 anos." />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Ana Beatriz - 15 anos" />
  <meta property="og:description" content="Clique para abrir o convite." />
  <meta property="og:image" content="https://convitepremium.github.io/convites-premium-1/assets/capa-whatsapp.jpg" />
  <meta property="og:image:secure_url" content="https://convitepremium.github.io/convites-premium-1/assets/capa-whatsapp.jpg" />
  <meta property="og:image:type" content="image/jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="675" />
  <meta property="og:url" content="https://convitepremium.github.io/convites-premium-Ana-Beatriz/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Ana Beatriz - 15 anos" />
  <meta name="twitter:description" content="Clique para abrir o convite." />
  <meta name="twitter:image" content="https://convitepremium.github.io/convites-premium-1/assets/capa-whatsapp.jpg" />

  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#10071a;color:#fff;font-family:Arial,Helvetica,sans-serif}
    .app{position:fixed;inset:0;background:#10071a;overflow:hidden}
    .screen{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:#10071a}
    .screen.active{display:flex}
    .startScreen{z-index:20;flex-direction:column;gap:18px;text-align:center;padding:28px;background:radial-gradient(circle at 50% 35%,rgba(110,70,150,.92),#10071a 76%)}
    .startScreen::before{content:"";position:absolute;inset:0;background:url('assets/principal.webp') center/cover no-repeat;opacity:.22;filter:blur(1px);z-index:-1}
    .brand{letter-spacing:7px;color:#ffe7ff;font-size:12px;font-weight:800;text-shadow:0 0 18px rgba(255,255,255,.45)}
    .startScreen h1{font-size:clamp(44px,13vw,88px);margin:0;line-height:.95;text-shadow:0 6px 24px rgba(0,0,0,.45)}
    .startScreen p{margin:0;color:#f0e9f7;font-size:18px}
    .gold-btn{border:0;border-radius:999px;background:linear-gradient(135deg,#fff2ff,#d9a9ff 55%,#8c56b8);color:#21092e;font-weight:900;font-size:18px;padding:17px 30px;box-shadow:0 18px 50px rgba(205,145,255,.35);cursor:pointer}
    .video{max-width:100vw;max-height:100dvh;width:auto;height:auto;object-fit:contain;background:#000}
    .mediaBox{position:relative;height:100dvh;max-height:100dvh;width:min(100vw,calc(100dvh * 941 / 1672));aspect-ratio:941/1672;display:block;background:#10071a;overflow:hidden}
    .art{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:block;user-select:none;-webkit-user-drag:none}
    .hotspot{position:absolute;border:0;background:rgba(255,255,255,0);cursor:pointer;z-index:3}
    .debug .hotspot{background:rgba(255,0,180,.32)!important;border:2px solid rgba(255,255,255,.95)}
    .hint{position:absolute;left:50%;bottom:max(10px,env(safe-area-inset-bottom));transform:translateX(-50%);background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(8px);border-radius:999px;padding:8px 13px;color:#f4eaff;font-size:12px;opacity:.55;z-index:4}
    .panel{position:absolute;inset:0;background:#10071a;display:none;align-items:center;justify-content:center;z-index:8}
    .panel.active{display:flex}
    .close{position:absolute;top:max(14px,env(safe-area-inset-top));right:14px;z-index:12;width:52px;height:52px;border-radius:50%;border:1px solid rgba(255,255,255,.32);background:rgba(0,0,0,.55);color:white;font-size:30px;font-weight:800;line-height:1;cursor:pointer;box-shadow:0 12px 30px rgba(0,0,0,.3)}
    .fade{position:absolute;inset:0;background:#10071a;opacity:0;pointer-events:none;transition:opacity .55s ease;z-index:15}
    .fade.on{opacity:1}
    .loader{position:absolute;inset:0;background:#10071a;z-index:30;display:none;place-items:center;text-align:center}
    .loader.active{display:grid}
    .spark{font-size:42px;margin-bottom:14px;animation:pulse 1.1s infinite alternate}
    .loader p{color:#f4eaff;margin:0;font-size:17px}
    @keyframes pulse{from{opacity:.55;transform:scale(.96)}to{opacity:1;transform:scale(1.03)}}
    @media (orientation:landscape){.mediaBox{height:100dvh;width:calc(100dvh * 941 / 1672)}.startScreen h1{font-size:58px}}
  </style>
</head>
<body>
  <div class="app">
    <section class="screen startScreen active" id="startScreen">
      <div class="brand">CONVITE PREMIUM</div>
      <h1>Ana Beatriz</h1>
      <p>Toque para iniciar a experiência</p>
      <button class="gold-btn" id="startBtn">Iniciar convite</button>
    </section>

    <section class="screen" id="videoScreen">
      <video class="video" id="introVideo" src="assets/abertura.mp4" muted playsinline webkit-playsinline preload="auto"></video>
    </section>

    <section class="screen" id="mainScreen">
      <div class="mediaBox">
        <img class="art" src="assets/principal.webp" alt="Convite Ana Beatriz 15 anos">
        <button class="hotspot" data-action="whatsapp" title="Confirmar presença" style="left:5%;top:74.8%;width:32%;height:9.5%;"></button>
        <button class="hotspot" data-action="presentes" title="Sugestões de presentes" style="left:36%;top:74.8%;width:30%;height:9.5%;"></button>
        <button class="hotspot" data-action="manual" title="Manual do convidado" style="left:64%;top:74.8%;width:32%;height:9.5%;"></button>
        <div class="hint">Toque nos botões do convite</div>
      </div>
    </section>

    <section class="panel" id="presentesScreen">
      <button class="close" id="closePresentes" aria-label="Voltar">×</button>
      <div class="mediaBox"><img class="art" src="assets/presentes.webp" alt="Sugestões de presentes"></div>
    </section>

    <section class="panel" id="manualScreen">
      <button class="close" id="closeManual" aria-label="Voltar">×</button>
      <div class="mediaBox"><img class="art" src="assets/manual.webp" alt="Manual do convidado"></div>
    </section>

    <div class="fade" id="fade"></div>
    <div class="loader" id="loader"><div><div class="spark">✨</div><p>Preparando seu convite...</p></div></div>
    <audio id="music" src="assets/musica.mp3" loop preload="auto"></audio>
  </div>

  <script>
    const qs = new URLSearchParams(location.search);
    if (qs.get('debug') === '1') document.body.classList.add('debug');

    const startScreen = document.getElementById('startScreen');
    const videoScreen = document.getElementById('videoScreen');
    const mainScreen = document.getElementById('mainScreen');
    const presentesScreen = document.getElementById('presentesScreen');
    const manualScreen = document.getElementById('manualScreen');
    const startBtn = document.getElementById('startBtn');
    const video = document.getElementById('introVideo');
    const music = document.getElementById('music');
    const fade = document.getElementById('fade');
    const loader = document.getElementById('loader');

    const WHATSAPP_LINK = 'https://wa.me/558188114428?text=Ol%C3%A1%2C%20confirmo%20minha%20presen%C3%A7a%20no%20anivers%C3%A1rio%20de%2015%20anos%20da%20Ana%20Beatriz.';

    // Compatibilidade iPhone/Safari:
    // 1) o vídeo fica sempre mudo;
    // 2) a música é destravada no toque do botão Iniciar;
    // 3) se o iPhone pausar sozinho, tentamos tocar novamente ao entrar na tela principal.
    video.muted = true;
    video.defaultMuted = true;
    video.setAttribute('muted', '');
    video.setAttribute('playsinline', '');
    video.setAttribute('webkit-playsinline', '');
    music.volume = 0.72;

    function hideAllScreens(){
      startScreen.classList.remove('active');
      videoScreen.classList.remove('active');
      mainScreen.classList.remove('active');
    }
    function show(screen){
      hideAllScreens();
      screen.classList.add('active');
    }
    function fadeTo(screen){
      fade.classList.add('on');
      setTimeout(() => {
        presentesScreen.classList.remove('active');
        manualScreen.classList.remove('active');
        show(screen);
        ensureMusic();
        fade.classList.remove('on');
      }, 550);
    }
    async function tryFullscreen(){
      try { if (!document.fullscreenElement && document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen(); } catch(e) {}
    }
    async function ensureMusic(){
      try {
        music.muted = false;
        music.volume = 0.72;
        await music.play();
      } catch(e) {}
    }
    function goMain(){
      video.pause();
      ensureMusic();
      fadeTo(mainScreen);
    }

    startBtn.addEventListener('click', async () => {
      startBtn.disabled = true;
      loader.classList.add('active');
      await tryFullscreen();
      await ensureMusic();
      setTimeout(async () => {
        loader.classList.remove('active');
        show(videoScreen);
        video.muted = true;
        try { video.currentTime = 0; await video.play(); } catch(e) { goMain(); }
      }, 650);
    });

    // Reforço para navegadores internos/iPhone: qualquer toque tenta manter a música ativa.
    document.addEventListener('touchend', ensureMusic, {passive:true});
    document.addEventListener('click', ensureMusic);

    video.addEventListener('ended', goMain);
    video.addEventListener('error', goMain);

    document.querySelectorAll('.hotspot').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const action = btn.dataset.action;
        if (action === 'presentes') presentesScreen.classList.add('active');
        if (action === 'manual') manualScreen.classList.add('active');
        if (action === 'whatsapp') window.open(WHATSAPP_LINK, '_blank');
      });
    });

    document.getElementById('closePresentes').addEventListener('click', () => presentesScreen.classList.remove('active'));
    document.getElementById('closeManual').addEventListener('click', () => manualScreen.classList.remove('active'));
  </script>
</body>
</html>
